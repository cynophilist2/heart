<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Secret Heart</title>
<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffe6ea;
  font-family:Arial, Helvetica, sans-serif;
}

.container{
  position:relative;
  width:240px;
  height:220px;
}

/* Message */
.message{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  font-size:18px;
  width:190px;
  opacity:0;
  transition:opacity 0.6s ease;
  pointer-events:none;
}

.container:hover .message{
  opacity:1;
}

/* Heart wrapper */
.heart-wrapper{
  position:absolute;
  top:40px;
  left:70px;
  width:100px;
  height:100px;
}

/* Base heart */
.heart{
  position:absolute;
  width:100px;
  height:100px;
  background:#e63946;
  transform:rotate(-45deg);
}

.heart:before,
.heart:after{
  content:"";
  position:absolute;
  width:100px;
  height:100px;
  background:#e63946;
  border-radius:50%;
}

.heart:before{
  top:-50px;
  left:0;
}

.heart:after{
  left:50px;
  top:0;
}

/* Folded corner */
.fold{
  position:absolute;
  width:100px;
  height:100px;
  background:#c92f3a;
  transform:rotate(-45deg);
  transform-origin:left bottom;
  clip-path:polygon(0 100%,100% 100%,0 0);
  transition:transform 0.6s ease;
}

/* Open animation */
.container:hover .fold{
  transform:rotate(-135deg);
}

</style>
</head>
<body>

<div class="container">

  <div class="message">
    I love you endlessly. Thank you for being in my life and making it so much better.
  </div>

  <div class="heart-wrapper">
    <div class="heart"></div>
    <div class="fold"></div>
  </div>

</div>

</body>
</html>
